# Netlify configuration — static site, no build step.
# Drag-and-drop or connect this repo; Netlify serves the root as-is.

[build]
  publish = "."
  # No command needed — these are plain HTML/CSS/JS files.

# Pretty URLs: /about instead of /about.html
[[redirects]]
  from = "/home"
  to = "/index.html"
  status = 301

# Security + sensible defaults on every response
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Long cache for static assets (safe — versioned/rarely changed)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
